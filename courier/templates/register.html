{% extends 'base.html' %}
{% block page_title %}注册{% endblock %}
{% block content %}
<div style="max-width:480px;margin:40px auto">
    <div class="card">
        <div style="text-align:center;margin-bottom:24px">
            <div style="font-size:48px;margin-bottom:8px">📦</div>
            <h2 style="font-size:20px">注册账号</h2>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" required placeholder="请设置用户名">
            </div>
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="text" name="phone" class="form-input" required placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" required placeholder="请设置密码">
            </div>
            <div class="form-group">
                <label class="form-label">角色</label>
                <select name="role" class="form-select">
                    <option value="user">C端用户</option>
                    <option value="courier">快递员</option>
                    <option value="station_admin">驿站管理员</option>
                    <option value="admin">后台管理员</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">注册</button>
        </form>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--gray-600)">
            已有账号？<a href="{% url 'login' %}">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}
