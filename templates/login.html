{% extends 'base.html' %}
{% block page_title %}登录{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto">
    <div class="card">
        <div style="text-align:center;margin-bottom:24px">
            <div style="font-size:48px;margin-bottom:8px">📦</div>
            <h2 style="font-size:20px">登录快递管理系统</h2>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">登录</button>
        </form>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--gray-600)">
            还没有账号？<a href="{% url 'register' %}">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
